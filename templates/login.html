<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LSAMS — Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
  body { background: linear-gradient(135deg, #1F3864 0%, #2E75B6 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-card { background: white; border-radius: 20px; padding: 40px 36px; box-shadow: 0 20px 60px rgba(0,0,0,0.25); width: 100%; max-width: 400px; }
  .login-logo { font-size: 36px; font-weight: 900; color: #1F3864; letter-spacing: -1px; }
  .login-logo span { color: #F90; }
  .form-control { border-radius: 10px; padding: 10px 14px; font-size: 14px; }
  .btn-login { background: #1F3864; color: white; border-radius: 10px; padding: 11px; font-weight: 700; font-size: 14px; border: none; }
  .btn-login:hover { background: #2E75B6; color: white; }
  .input-group-text { border-radius: 10px 0 0 10px; background: #f8fafc; }
</style>
</head>
<body>
<div class="login-card">
  <div class="text-center mb-4">
    <div class="login-logo">LSAMS <span>●</span></div>
    <div style="color:#6b7a99;font-size:13px;margin-top:4px">Lazada Seller Activation Management System</div>
    <div style="color:#9aabc5;font-size:11px;margin-top:2px">Altria Management Corporation</div>
  </div>

  {% for cat, msg in get_flashed_messages(with_categories=true) %}
  <div class="alert alert-{{ cat }} py-2" style="font-size:13px">{{ msg }}</div>
  {% endfor %}

  <form method="POST" action="{{ url_for('login') }}">
    <div class="mb-3">
      <label class="form-label fw-600" style="font-size:12px;color:#4a5568;font-weight:700">USERNAME</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-person" style="color:#9aabc5"></i></span>
        <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus
               style="border-left:none;border-radius:0 10px 10px 0">
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label" style="font-size:12px;color:#4a5568;font-weight:700">PASSWORD</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock" style="color:#9aabc5"></i></span>
        <input type="password" name="password" id="passwordField" class="form-control" placeholder="Enter password" required
               style="border-left:none;border-right:none;border-radius:0">
        <span class="input-group-text" style="cursor:pointer;border-radius:0 10px 10px 0" onclick="togglePw()">
          <i class="bi bi-eye" id="pwEye" style="color:#9aabc5"></i>
        </span>
      </div>
    </div>
    <div class="d-flex align-items-center justify-content-between mb-3">
      <div class="form-check">
        <input type="checkbox" name="remember" class="form-check-input" id="remember">
        <label class="form-check-label" for="remember" style="font-size:12px;color:#6b7a99">Remember me</label>
      </div>
    </div>
    <button type="submit" class="btn btn-login w-100">
      <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
    </button>
  </form>

  <div style="text-align:center;margin-top:20px;font-size:11px;color:#c0c9d8">
    &copy; 2026 Altria Management Corporation
  </div>
</div>
<script>
function togglePw() {
  const f = document.getElementById('passwordField');
  const e = document.getElementById('pwEye');
  f.type = f.type === 'password' ? 'text' : 'password';
  e.className = f.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
}
</script>
</body>
</html>
